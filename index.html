<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moje aplikácie</title>
  <meta name="description" content="Prehľad aplikácií Košíq, Levela a Cyclia.">
  <meta name="theme-color" content="#0f172a">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe3ee;
      --blue: #2563eb;
      --shadow: 0 18px 50px rgba(15, 23, 42, .10);
      --radius: 8px;
      --container: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .container {
      width: min(var(--container), calc(100% - 40px));
      margin: 0 auto;
    }

    .header {
      border-bottom: 1px solid var(--line);
      background: rgba(246, 248, 251, .9);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
      font-size: 17px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      font-size: 14px;
      box-shadow: 0 12px 28px rgba(37, 99, 235, .24);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #475569;
      font-size: 14px;
      font-weight: 750;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--ink);
    }

    .hero {
      padding: 74px 0 36px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .apps {
      padding: 26px 0 74px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .app-card {
      min-height: 310px;
      display: flex;
      flex-direction: column;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .app-card:hover {
      transform: translateY(-2px);
      transition: transform .18s ease;
    }

    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .icon {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      overflow: hidden;
      flex: 0 0 auto;
      background: #e2e8f0;
      box-shadow: 0 14px 30px rgba(15, 23, 42, .16);
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tag {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: var(--radius);
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 850;
    }

    h2 {
      margin-bottom: 8px;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .app-card p {
      margin-bottom: 22px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: auto;
    }

    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 850;
      font-size: 14px;
    }

    .button.primary {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .button:hover,
    .button:focus-visible {
      border-color: #94a3b8;
    }

    .footer {
      padding: 30px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-weight: 750;
    }

    @media (max-width: 880px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 15px 0;
      }

      .nav-links {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .hero {
        padding-top: 52px;
      }

      .app-card {
        min-height: 0;
      }

      .footer-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="#top" aria-label="Domov">
        <span class="brand-mark">AP</span>
        <span>Moje aplikácie</span>
      </a>
      <nav class="nav-links" aria-label="Navigacia">
        <a href="#kosiq">Košíq</a>
        <a href="#levela">Levela</a>
        <a href="#cyclia">Cyclia</a>
        <a href="mailto:lukas.bakuliak@gmail.com">Kontakt</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container">
        <h1>Moje aplikácie</h1>
        <p class="lead">Všetky appky na jednom mieste.</p>
      </div>
    </section>

    <section class="apps">
      <div class="container grid">
        <article class="app-card" id="kosiq">
          <div class="app-top">
            <span class="icon"><img src="kosiq/assets/icon-ios-1024.png" alt="Ikona aplikacie Košíq"></span>
            <span class="tag">Nákupy</span>
          </div>
          <h2>Košíq</h2>
          <p>Nákupný zoznam a ceny potravín.</p>
          <div class="actions">
            <a class="button primary" href="kosiq/index_kosiq.html">Detail</a>
          </div>
        </article>

        <article class="app-card" id="levela">
          <div class="app-top">
            <span class="icon"><img src="levela/assets/icon-ios-1024.png" alt="Ikona aplikacie Levela"></span>
            <span class="tag">Fitness</span>
          </div>
          <h2>Levela</h2>
          <p>Tréningový denník a progres.</p>
          <div class="actions">
            <a class="button primary" href="levela/index_levela.html">Detail</a>
          </div>
        </article>

        <article class="app-card" id="cyclia">
          <div class="app-top">
            <span class="icon"><img src="cyclia/assets/icon-ios-512.jpg" alt="Ikona aplikacie Cyclia"></span>
            <span class="tag">Cyklus</span>
          </div>
          <h2>Cyclia</h2>
          <p>Sledovanie cyklu a menštruácie.</p>
          <div class="actions">
            <a class="button primary" href="cyclia/index.html">Detail</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <div>© 2026</div>
      <div class="footer-links">
        <a href="mailto:lukas.bakuliak@gmail.com">Kontakt</a>
      </div>
    </div>
  </footer>
</body>
</html>
